<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
  >
  <title>Louisa's Perfumes Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="/logo.jpeg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand-lockup">
      <p class="eyebrow">Private Admin</p>
      <a href="/admin.html" class="brand-name" aria-label="Louisa's Perfumes admin">Louisa's Perfumes</a>
    </div>
  </header>

  <main class="admin-page">
    <section class="admin-section admin-page-section">
      <div class="section-heading">
        <p class="eyebrow">Admin dashboard</p>
        <h2>Manage perfume inventory</h2>
        <p>Sign in to add new perfumes, upload product images, and mark products in or out of stock.</p>
      </div>

      <div class="admin-layout">
        <div class="admin-card">
          <div class="admin-header">
            <h3>Admin Access</h3>
            <div class="admin-header-actions">
              <button type="button" class="button button-secondary" id="admin-toggle">Sign In Required</button>
              <button type="button" class="button button-secondary hidden" id="admin-logout">Sign Out</button>
            </div>
          </div>

          <div class="admin-access" id="admin-access">
            <form id="admin-login-form" class="admin-login-form" novalidate>
              <div class="admin-access-row">
                <label>
                  Admin username
                  <input
                    type="text"
                    id="admin-username"
                    name="admin-username"
                    maxlength="40"
                    autocomplete="username"
                    placeholder="Enter admin username"
                    required
                  >
                </label>
                <label>
                  Admin password
                  <input
                    type="password"
                    id="admin-password"
                    name="admin-password"
                    maxlength="100"
                    autocomplete="current-password"
                    placeholder="Enter admin password"
                    required
                  >
                </label>
              </div>
              <button type="submit" class="button button-secondary">Sign In</button>
            </form>
          </div>

          <div class="admin-panel hidden" id="admin-panel">
            <form id="admin-form" class="admin-form" novalidate>
              <div class="field-grid">
                <label>
                  Perfume name
                  <input type="text" name="name" maxlength="80" required>
                </label>
                <label>
                  Manufacturer
                  <input type="text" name="manufacturer" maxlength="80" required>
                </label>
                <label>
                  Size (ML)
                  <input type="number" name="ml" min="1" max="500" required>
                </label>
                <label>
                  Price (NGN)
                  <input type="number" name="price" min="1" step="1" required>
                </label>
                <label>
                  Notes
                  <input type="text" name="notes" maxlength="120" placeholder="rose, amber, vanilla" required>
                </label>
                <label>
                  Product image
                  <input type="file" name="image" accept="image/png,image/jpeg,image/webp" required>
                </label>
              </div>

              <label>
                Description
                <textarea name="description" rows="4" maxlength="240" required></textarea>
              </label>

              <label class="checkbox-row">
                <input type="checkbox" name="inStock" checked>
                Mark as available
              </label>

              <div class="admin-actions">
                <button class="button button-primary" type="submit">Save Perfume</button>
                <button class="button button-secondary" type="button" id="admin-reset">Reset Form</button>
              </div>
              <p class="admin-message" id="admin-message" aria-live="polite"></p>
            </form>
          </div>
        </div>

        <div class="admin-card">
          <h3>Current inventory</h3>
          <div id="inventory-list" class="inventory-list" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="admin.js" defer></script>
</body>
</html>
